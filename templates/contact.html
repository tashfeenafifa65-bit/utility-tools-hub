{% extends "base.html" %}

{% block title %}Contact Us - ToolHub{% endblock %}

{% block content %}
<div class="container">
    <div class="tool-header text-center">
        <h1>Contact Us</h1>
        <p>Have a suggestion or found a bug? We'd love to hear from you.</p>
    </div>

    <div class="tool-container">
        <form action="/contact" method="POST">
            <div class="input-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="input-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Send Message <i class="fas fa-paper-plane"></i></button>
        </form>
    </div>
</div>
{% endblock %}
